name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Shell syntax checks
        run: |
          bash -n install.sh
          bash -n cue/shell/cue.bash
          if command -v zsh >/dev/null 2>&1; then
            zsh -n cue/shell/cue.zsh
          fi

      - name: Run pytest
        run: python -m pytest -q

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install smoke test
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          export HOME="${RUNNER_TEMP}/cue-home"
          mkdir -p "${HOME}"
          export CUE_CONFIG_DIR="${HOME}/.config/cue"
          export CUE_SOCKET="${CUE_CONFIG_DIR}/daemon.sock"
          export CUE_PID="${CUE_CONFIG_DIR}/daemon.pid"
          ./install.sh --no-daemon --shell bash
          export PATH="${CUE_CONFIG_DIR}/venv/bin:${PATH}"
          command -v cue
          command -v cue-daemon
          python -c "import cue; print('cue', cue.__file__)"
          cue-daemon start
          cue-daemon health
          cue doctor
